kind = "web"
previewPath = "/"
title = "Medicology QBank"
version = "1.0.0"
id = "artifacts/medicology"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18521

[services.development]
run = "pnpm --filter @workspace/medicology run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medicology", "run", "build" ]
publicDir = "artifacts/medicology/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18521"
BASE_PATH = "/"
