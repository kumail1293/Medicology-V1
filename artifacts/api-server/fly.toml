app = "medicology-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"
  dockerfile_path = "artifacts/api-server/Dockerfile"
  context = "."

[env]
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
